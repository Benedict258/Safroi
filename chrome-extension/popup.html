<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #050B10;
      --card: #0B1219;
      --mint: #E0FEF6;
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.4);
    }
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 16px;
      font-weight: 900;
    }
    .title {
      font-size: 18px;
      font-weight: 800;
      flex: 1;
      letter-spacing: -0.02em;
    }
    .highlight { color: var(--mint); }
    
    /* Loading State */
    #loading {
      text-align: center;
      padding: 30px 0;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--mint);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results UI */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .score {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.3; filter: brightness(0.8); transform: scale(0.95); }
      50% { opacity: 1; filter: brightness(1.2); transform: scale(1.05); }
      100% { opacity: 0.3; filter: brightness(0.8); transform: scale(0.95); }
    }
    .severity {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.1em;
    }
    .severity.high { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .severity.medium { background: rgba(245, 158, 11, 0.1); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.2); }
    .severity.low { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.2); }

    .score { color: #ffffff; } /* Default */
    .score.low { background-color: #22C55E; box-shadow: 0 0 12px rgba(34, 197, 94, 0.4); }
    .score.medium { background-color: #F59E0B; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); }
    .score.high { background-color: #EF4444; box-shadow: 0 0 12px rgba(239, 68, 68, 0.4); }

    .summary {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .risk-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .risk-item {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      transition: transform 0.2s;
    }
    .risk-item:hover { transform: scale(1.02); }
    
    .risk-item.low {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(11, 18, 25, 1) 100%);
      border-color: rgba(34, 197, 94, 0.2);
    }
    .risk-item.low .risk-title { color: #22C55E; }
    
    .risk-item.medium {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.08) 0%, rgba(11, 18, 25, 1) 100%);
      border-color: rgba(245, 158, 11, 0.2);
    }
    .risk-item.medium .risk-title { color: #F59E0B; }
    
    .risk-item.high {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.08) 0%, rgba(11, 18, 25, 1) 100%);
      border-color: rgba(239, 68, 68, 0.2);
    }
    .risk-item.high .risk-title { color: #EF4444; }

    .risk-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .risk-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

    .btn {
      width: 100%;
      background: var(--mint);
      color: var(--bg);
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid var(--border);
      margin-top: 12px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--border);
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #22C55E; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div class="title">Clause<span class="highlight">Lens</span></div>
    <label class="switch">
      <input type="checkbox" id="scan-toggle" checked>
      <span class="slider round"></span>
    </label>
  </div>

  <div id="intro-view" style="display: none; text-align: center; padding: 20px 0;">
    <p style="font-size: 14px; color: var(--muted); margin-bottom: 20px;">Real-time policy protection is <strong>OFF</strong>. Turn it on to scan site risks.</p>
    <div style="opacity: 0.1; filter: grayscale(1); margin-bottom: 30px;">
       <div class="logo" style="width: 60px; height: 60px; font-size: 32px; border-radius: 16px; margin: 0 auto;">S</div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p style="font-size: 14px; font-weight: 600;">Analyzing site policies...</p>
    <p id="loading-sub" style="font-size: 11px; color: var(--muted); margin-top: 4px;">Identifying ToS & Privacy pages</p>
  </div>

  <div id="error" style="display: none; text-align: center; padding: 20px;">
    <p id="errorText" style="color: #EF4444; font-size: 14px;">Analysis failed. Try again?</p>
    <button id="retryBtn" class="btn" style="margin-top: 10px;">Retry</button>
  </div>

  <div id="results" style="display: none;">
    <div class="result-card">
      <div class="score-row">
        <div style="display: flex; align-items: center;">
          <span class="score" id="scoreValue"></span>
          <span style="color: var(--muted); font-size: 11px; font-weight: bold; letter-spacing: 0.05em;">AI CONFIDENCE</span>
        </div>
        <span class="severity" id="severityText">Scanning</span>
      </div>
      <div class="summary" id="summaryText"></div>
      <div class="risk-list" id="riskList"></div>
    </div>
    
    <button id="reanalyzeBtn" class="btn">Re-analyze Page</button>
    <button id="dashboardBtn" class="btn btn-secondary">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
