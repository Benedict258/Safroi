<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #050B10;
      --card: #0B1219;
      --mint: #E0FEF6;
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.4);
    }
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 16px;
      font-weight: 900;
    }
    .title {
      font-size: 18px;
      font-weight: 800;
      flex: 1;
      letter-spacing: -0.02em;
    }
    .highlight { color: var(--mint); }
    
    /* Loading State */
    #loading {
      text-align: center;
      padding: 30px 0;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--mint);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results UI */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .score {
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }
    .severity {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.1em;
    }
    .high { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .medium { background: rgba(245, 158, 11, 0.1); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.2); }
    .low { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.2); }

    .summary {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .risk-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .risk-item {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .risk-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
    .risk-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

    .btn {
      width: 100%;
      background: var(--mint);
      color: var(--bg);
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid var(--border);
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div class="title">Clause<span class="highlight">Lens</span></div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p style="font-size: 14px; font-weight: 600;">Analyzing site policies...</p>
    <p id="loading-sub" style="font-size: 11px; color: var(--muted); margin-top: 4px;">Identifying ToS & Privacy pages</p>
  </div>

  <div id="error" style="display: none; text-align: center; padding: 20px;">
    <p id="errorText" style="color: #EF4444; font-size: 14px;">Analysis failed. Try again?</p>
    <button id="retryBtn" class="btn" style="margin-top: 10px;">Retry</button>
  </div>

  <div id="results" style="display: none;">
    <div class="result-card">
      <div class="score-row">
        <div>
          <span class="score" id="scoreValue">0</span>
          <span style="color: var(--muted); font-size: 14px; font-weight: bold;">/ 10</span>
        </div>
        <span class="severity" id="severityText">Scanning</span>
      </div>
      <div class="summary" id="summaryText"></div>
      <div class="risk-list" id="riskList"></div>
    </div>
    
    <button id="reanalyzeBtn" class="btn">Re-analyze Page</button>
    <button id="dashboardBtn" class="btn btn-secondary">Open Dashboard</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
