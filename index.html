<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClauseLens | Protecting your Digital FootPrint</title>
    <meta name="title" content="ClauseLens | Protecting your Digital FootPrint">
    <link rel="icon" type="image/png" href="/Clause.png">
    <link rel="apple-touch-icon" href="/Clause.png">
    <script>
      // Suppress benign console noise and environment-specific errors
      (function() {
        const suppressList = [
          'WebSocket', 
          'socket', 
          '[vite] failed to connect', 
          'HMR', 
          'WebSocket closed', 
          'monaco-editor', 
          'web worker', 
          'extension context invalidated',
          'Writer trial',
          'Origin trial',
          'ClauseLens: Checking auth status',
          'ClauseLens: Found custom auth status',
          'ClauseLens: Found Firebase auth status',
          'Slow network is detected',
          'violates the following Content Security Policy directive',
          'preloaded using link preload but not used',
          'Please note that you are testing the GHP integration',
          'Failed to start Logcat polling',
          'Error while streaming response: _.iG',
          'MakersuiteAppletControlService',
          'StreamCodeAssistantOfflineGeneration',
          'Origin trial controlled feature not enabled',
          'Unrecognized feature'
        ];
        
        const shouldSuppress = (msg) => {
          if (!msg) return false;
          const str = String(msg);
          return suppressList.some(s => str.toLowerCase().includes(s.toLowerCase()));
        };

        window.addEventListener('unhandledrejection', (event) => {
          if (shouldSuppress(event.reason?.message || event.reason)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('error', (event) => {
          if (shouldSuppress(event.message)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        const wrap = (original) => {
          if (!original) return original;
          return (...args) => {
            const firstArg = args[0];
            if (firstArg && shouldSuppress(firstArg)) return;
            // Also check the entire string representation of arguments for complex logs
            if (args.some(a => shouldSuppress(a))) return;
            original.apply(console, args);
          };
        };

        console.warn = wrap(console.warn);
        console.error = wrap(console.error);
        console.info = wrap(console.info);
        console.debug = wrap(console.debug);
        console.log = wrap(console.log);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
